<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千里江山图 先快后慢纵向流动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000;
            overflow: hidden;
            height: 100vh;
        }
        .container {
            height: 200vh; /* 两张图高度 */
            animation: scrollMove 90s ease-out infinite;
        }
        img {
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            display: block;
        }
        @keyframes scrollMove {
            0% { transform: translateY(0); }
            100% { transform: translateY(-100vh); }
        }
    </style>
</head>
<body>
    <div class="container">
        < img src="https://p1.ssl.qhimg.com/t01d8a8a4ef07a8b7c0.jpg" alt="千里江山图">
        < img src="https://p1.ssl.qhimg.com/t01d8a8a4ef07a8b7c0.jpg" alt="千里江山图">
    </div>
</body>
</html>
