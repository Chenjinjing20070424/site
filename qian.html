<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千里江山图 先快后慢纵向流动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #000;
            overflow: hidden;
        }
        .scroll-banner {
            width: 100vw;
            height: 100vh;
            /* 国内稳定可访问的千里江山图竖版链接 */
            background: url("https://img1.baidu.com/it/u=2747330779,2275763028&fm=26&fmt=auto&app=138&f=JPEG?w=960&h=3989") repeat-y;
            background-size: 100% auto;
            /* 关键：用 ease-out 实现先快后慢 */
            animation: scrollMove 90s ease-out infinite;
        }
        @keyframes scrollMove {
            0% { background-position: center 0; }
            100% { background-position: center -100%; }
        }
    </style>
</head>
<body>
    <div class="scroll-banner"></div>
</body>
</html>
