<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千里江山图 - 先快后慢滚动</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 容器：只显示窗口大小，隐藏超出部分 */
        .scroll-container {
            width: 100vw;
            height: 600px;
            overflow: hidden;
            position: relative;
        }
        /* 千里江山图：从左上角开始，先快后慢滚动 */
        .qianli-jiangshan {
            width: 300%; /* 足够长的长卷 */
            height: 100%;
            background: url("https://p1.ssl.qhimg.com/t01d9a2b01d0b7b343a.jpg") no-repeat left top;
            background-size: cover;
            /* ease-out：先快后慢，forwards：滚动结束后停住 */
            animation: scrollBrake 20s ease-out forwards;
        }
        /* 关键帧：从左上角开始，横向滚动到合适位置 */
        @keyframes scrollBrake {
            0% {
                transform: translateX(0); /* 起点：左上角 */
            }
            100% {
                transform: translateX(-66.6%); /* 终点：滚动2/3长度，展示完整长卷 */
            }
        }
    </style>
</head>
<body>
    <div class="scroll-container">
        <div class="qianli-jiangshan"></div>
    </div>
</body>
</html>
