<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千里江山图 横向流动动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #000;
        }
        /* 画卷容器 */
        .scroll-banner {
            width: 100vw;
            height: 600px; /* 自定义画卷高度 */
            background: url("https://img0.baidu.com/it/u=1297311139,3829221139&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=356") repeat-x;
            background-size: auto 100%;
            /* 动画名称 时长 线性匀速 无限循环 */
            animation: scrollMove 60s linear infinite;
        }

        /* 从左向右滚动关键帧 */
        @keyframes scrollMove {
            0% {
                background-position: 0 center;
            }
            100% {
                background-position: -100% center;
            }
        }
    </style>
</head>
<body>
    <div class="scroll-banner"></div>
</body>
</html>
