<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千里江山图 - 先快后慢</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .scroll-container {
            width: 100vw;
            height: 600px;
            overflow: hidden;
            position: relative;
        }
        .mountain-bg {
            width: 200%;
            height: 100%;
            background: 
                linear-gradient(to bottom, #f0f9e8 0%, #b5e7d0 15%, #68b99e 30%, #3a8a7a 45%, #236655 60%, #124036 75%, #0a2a22 100%),
                repeating-linear-gradient(90deg,
                    #124036 0px, #124036 180px,
                    #236655 180px, #236655 360px,
                    #3a8a7a 360px, #3a8a7a 540px,
                    #68b99e 540px, #68b99e 720px,
                    #b5e7d0 720px, #b5e7d0 900px
                );
            background-blend-mode: overlay;
            /* 先快后慢：ease-out，单次滚动，结束后停住 */
            animation: scrollBrake 15s ease-out forwards;
        }
        @keyframes scrollBrake {
            0% {
                transform: translate(0, 0); /* 从左上角开始 */
            }
            100% {
                transform: translate(-50%, 0); /* 滚动到完整展示长卷，停住 */
            }
        }
    </style>
</head>
<body>
    <div class="scroll-container">
        <div class="mountain-bg"></div>
    </div>
</body>
</html>
