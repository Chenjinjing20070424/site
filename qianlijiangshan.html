<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千里江山图 横向流动动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #000;
        }
        .scroll-banner {
            width: 100vw;
            height: 600px;
            /* 真正的千里江山图链接 */
            background: url("https://img1.baidu.com/it/u=2484017730,2351333200&fm=253&fmt=auto&app=138&f=JPEG?w=800&h=356") repeat-x;
            background-size: auto 100%;
            animation: scrollMove 60s linear infinite;
        }
        @keyframes scrollMove {
            0% { background-position: 0 center; }
            100% { background-position: -100% center; }
        }
    </style>
</head>
<body>
    <div class="scroll-banner"></div>
</body>
</html>
