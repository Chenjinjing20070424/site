<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千里江山图 - 缓动放映</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #f0e6d2;
        }
        .scroll-container {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }
        .painting-wrapper {
            height: 100%;
            display: flex;
            align-items: center;
            /* 先快后慢的缓动动画，总时长30秒 */
            animation: slowScroll 30s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
        }
        .painting {
            height: 90vh;
            width: auto;
            object-fit: contain;
        }
        @keyframes slowScroll {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(calc(-100% + 100vw));
            }
        }
    </style>
</head>
<body>
    <div class="scroll-container">
        <div class="painting-wrapper">
            < img 
                src="https://picsum.photos/id/1036/3989/960" 
                alt="千里江山图" 
                class="painting"
            >
        </div>
    </div>
</body>
</html>
