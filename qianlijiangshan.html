<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千里江山图 - 惯性拖拽放映</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #1a3a2a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        .scroll-container {
            width: 100vw;
            height: 90vh;
            overflow: hidden;
            position: relative;
            cursor: grab;
        }
        .scroll-container:active {
            cursor: grabbing;
        }
        .painting-wrapper {
            height: 100%;
            display: flex;
            align-items: center;
            position: absolute;
        }
        .painting {
            height: 100%;
            width: auto;
            object-fit: contain;
            user-select: none;
        }
        .tip {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            color: white;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>

    <div class="scroll-container">
        <div class="painting-wrapper">

                id="paintingImg"
                src="https://upload.wikimedia.org/wikipedia/commons/9/96/%E5%8D%83%E9%87%8C%E6%B1%9F%E5%B
