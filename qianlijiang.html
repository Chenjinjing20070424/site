<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>千里江山图 纵向流动动画</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            min-height: 100vh;
            background: #000;
            overflow: hidden; /* 隐藏滚动条 */
        }
        .scroll-banner {
            width: 100vw;
            height: 100vh;
            /* 用纵向的千里江山图链接，保证上下滚动效果 */
            background: url("https://k.sinaimg.cn/n/sinakd20201112s/467/w800h6067/20201112/08a6-kcunqze3837469.jpg/w700d1q75cms.jpg?by=cms_fixed_width") repeat-y;
            background-size: 100% auto;
            animation: scrollMove 60s linear infinite;
        }
        /* 关键：修改为纵向背景位置变化 */
        @keyframes scrollMove {
            0% { background-position: center 0; }
            100% { background-position: center -200%; }
        }
    </style>
</head>
<body>
    <div class="scroll-banner"></div>
</body>
</html>
