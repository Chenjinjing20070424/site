<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>3D Gradient Cube</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: #f4f4f4;
        }
        .cube-container {
            position: relative;
            width: 200px;
            height: 200px;
        }
        .cube-face {
            position: absolute;
            width: 200px;
            height: 200px;
            opacity: 0.85;
        }

        /* 正面 */
        .face-front {
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            z-index: 3;
        }

        /* 右侧面 */
        .face-right {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            transform: skewY(30deg) translate(100px, -50px);
            z-index: 2;
        }

        /* 左侧面 */
        .face-left {
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 100%);
            transform: skewY(-30deg) translate(-100px, -50px);
            z-index: 2;
        }

        /* 顶面 */
        .face-top {
            background: linear-gradient(135deg, #fdcbf1 0%, #e6dee9 100%);
            transform: skewX(30deg) translate(-50px, -100px);
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="cube-container">
        <div class="cube-face face-front"></div>
        <div class="cube-face face-right"></div>
        <div class="cube-face face-left"></div>
        <div class="cube-face face-top"></div>
    </div>
</body>
</html>
